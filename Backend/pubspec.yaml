name: road_damage_detector
description: AI-Based Road Damage Detection System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Bluetooth
  flutter_blue_plus: ^1.32.0
  
  # Camera
  camera: ^0.10.5
  image_picker: ^1.0.4
  
  # AI/ML
  tflite_flutter: ^0.10.3
  image: ^4.1.3
  
  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  
  # State Management
  provider: ^6.1.1
  
  # Permissions
  permission_handler: ^11.0.1
  
  # UI
  flutter_svg: ^2.0.7
  intl: ^0.18.1
  url_launcher: ^6.2.0
  share_plus: ^7.2.1
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # Storage
  shared_preferences: ^2.2.0
  
  # Utilities
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/road_damage_model.tflite
    - assets/images/+